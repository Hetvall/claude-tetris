<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false">
            <span class="theme-icon" id="theme-icon">🌙</span>
            <span id="theme-label">DARK</span>
          </button>
        </div>

        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">HOLD</span>
          <canvas id="hold-canvas" width="120" height="120"></canvas>
        </div>

      </aside>
      <div class="panel-section controls">
        <span class="label">CONTROLS</span>
        <ul>
          <li><kbd>←</kbd><kbd>→</kbd> mover</li>
          <li><kbd>↑</kbd> rotar</li>
          <li><kbd>↓</kbd> bajar</li>
          <li><kbd>Space</kbd> caída</li>
          <li><kbd>C</kbd> guardar</li>
          <li><kbd>P</kbd> pausa</li>
        </ul>
      </div>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>

        <div id="gameover-extra" class="hidden">
          <div id="name-entry" class="hidden">
            <p class="hiscores-prompt">¡Nueva puntuación alta!</p>
            <div class="name-entry-row">
              <input type="text" id="name-input" maxlength="12" placeholder="Tu nombre" autocomplete="off" />
              <button id="save-name-btn">Guardar</button>
            </div>
          </div>

          <div class="hiscores-block">
            <span class="label">RECORDS</span>
            <div id="gameover-hiscores" class="hiscores"></div>
            <div class="hiscores-stats">
              <span>Mejor combo: <strong id="gameover-best-combo">0</strong></span>
              <span>Máx. líneas: <strong id="gameover-max-lines">0</strong></span>
            </div>
            <button id="reset-records-btn" class="reset-records-btn">Reiniciar records</button>
          </div>
        </div>
      </div>
    </div>

    <div id="start-screen" class="overlay">
      <div class="overlay-box">
        <p class="start-title">TETRIS</p>
        <div class="hiscores-block">
          <span class="label">RECORDS</span>
          <div id="start-hiscores" class="hiscores"></div>
          <div class="hiscores-stats">
            <span>Mejor combo: <strong id="start-best-combo">0</strong></span>
            <span>Máx. líneas: <strong id="start-max-lines">0</strong></span>
          </div>
        </div>
        <button id="start-btn">Jugar</button>
        <button id="reset-records-btn-start" class="reset-records-btn">Reiniciar records</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>

</html>
