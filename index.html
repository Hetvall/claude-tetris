<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false">
            <span class="theme-icon" id="theme-icon">🌙</span>
            <span id="theme-label">DARK</span>
          </button>
        </div>

        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">HOLD</span>
          <canvas id="hold-canvas" width="120" height="120"></canvas>
        </div>

      </aside>
      <div class="panel-section controls">
        <span class="label">CONTROLS</span>
        <ul>
          <li><kbd>←</kbd><kbd>→</kbd> mover</li>
          <li><kbd>↑</kbd> rotar</li>
          <li><kbd>↓</kbd> bajar</li>
          <li><kbd>Space</kbd> caída</li>
          <li><kbd>C</kbd> guardar</li>
          <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
        </ul>
      </div>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box" id="gameover-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>

      <div class="overlay-box hidden" id="pause-menu">
        <p id="pause-title">PAUSA</p>
        <div class="pause-actions">
          <button id="resume-btn" type="button">Reanudar</button>
          <button id="pause-restart-btn" type="button">Reiniciar</button>
          <button id="controls-toggle-btn" type="button" aria-expanded="false">Ver controles</button>
        </div>

        <div class="pause-level">
          <span class="label">NIVEL INICIAL</span>
          <div class="level-stepper">
            <button id="level-down-btn" type="button" aria-label="Bajar nivel inicial">-</button>
            <span class="value" id="level-select-value">1</span>
            <button id="level-up-btn" type="button" aria-label="Subir nivel inicial">+</button>
          </div>
        </div>

        <div class="controls pause-controls hidden" id="pause-controls">
          <span class="label">CONTROLES</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>C</kbd> guardar</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>

</html>
